<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <style>
      :root {
        --standard_image_size: 200px;
        --standard_padding: 8px;
      }
      table, td {
        border      : 1px solid black;
        text-align  : center;
      }
      #dbHEADER > td {
        font-weight : bold;
      }
      img.photo {
        width       : var(--standard_image_size);
        height      : var(--standard_image_size);
        margin      : 0;
        display     : block;
      }
      td.photo {
        padding     : 0;
      }
      td.name {
        padding     : var(--standard_padding);
      }
      td.owner {
        padding     : var(--standard_padding);
      }
      td.account {
        padding     : var(--standard_padding);
      }
      td.typing {
        padding     : var(--standard_padding);
      }
      td.INVALID {
        padding     : var(--standard_padding);
        background  : red;
        font-weight : bold;
      }
      .INVALID {
        background  : #7F0000;
        font-weight : bold;
        color       : #FFF;
      }
    </style>
  </head>
  <body onload="initialize()">
    <h1>Computerlings Database</h1>
    <p>By Cécilemin and PauIndeed :-)</p>
    <table id="db">
      <thead>
        <tr id="dbHEADER">
        </tr>
      </thead>
      <tbody id="dbBODY">
      </tbody>
    </table>
    
    <script src="db.js"></script>
  </body>
</html>
