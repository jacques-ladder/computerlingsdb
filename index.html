<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComputerlingsDB</title>
    <link href="style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" type="image/x-icon" href="assets/logo/logo.png?v=2">
  </head>
  <header>
    <section class="navbar">
      <div class="logo">
        <a href="index.html" class="logo">
          <img src="assets/logo/logotransparent.png" alt="Icon" width="50" height="50">
        </a>
        <h2>Computerlings Database</h2>
      </div>
      <div class="navbuttons">
        <a class="petitionbtn" href="https://discord.gg/DsAqSfF5VD">Discord</a>
        <a class="petitionbtn" href="info.html">Info</a>
        <a class="petitionbtn" href="petition.html">Add a Computerling</a>
      </div>
    </section>
  </header>
  <body onload="initialize('database')">
    <article id="search_machine">
      <select id="search_by" class="search_by" name="search_by" required>
        <option value="name" selected>Name</option>
        <option value="links">Accounts</option>
        <option value="owner">Owner</option>
        <option value="description">Description</option>
        <option value="typing">Brackets</option>
      </select>
      <input type="text" class="search_bar" id="search" placeholder="Search..." autofocus></input>
      <button id="search_button" class="search_button">SEARCH</button>
      <span id="search_dialogue" class="dialogue"></span>
    </article>
    <p>This is a major work-in-progress!</p>
    <p id="temporary key area remove later" style="margin-left: 1vw">
      <mark style="background-color: #8deb4f;">GREEN</mark> = Active<br>
      <mark style="background-color: #f1de6d;">YELLOW</mark> = Semi-Active<br>
      <mark style="background-color: #e48a36;">ORANGE</mark> = Hiatus<br>
      <mark style="background-color: #e74a4a;">RED</mark> = Retired
    </p><br>
    <div id="wrapper">
      <table id="db">
        <thead>
          <tr id="dbHEADER">
          </tr>
        </thead>
        <tbody id="dbBODY">
        </tbody>
      </table>
    </div>
    <script src="db.js"></script>
  </body>
</html>
