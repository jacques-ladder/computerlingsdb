<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComputerlingsDB</title>
    <link href="/computerlingsdb/style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" type="image/x-icon" href="assets/logo/logo.png?v=2">
  </head>
  <header>
    <section class="navbar">
      <a href="index.html" class="logo">
        <img src="assets/logo/logotransparent.png" alt="Icon" width="50" height="50">
      </a>
      <h2>Computerlings Database</h2>
      <a class="infobtn" href="info.html">Info</a>
      <a class="petitionbtn" href="petition.html">Add a Computerling</a>
    </section>
  </header>
  <body onload="initialize()">
    <article id="search_machine">
      <select id="search_by" class="search_by" name="search_by" required>
        <option value="name" selected>Name</option>
        <option value="links">Handles</option>
        <option value="owner">Owner</option>
        <option value="typing">Typing Quirk</option>
      </select>
      <input type="text" class="search_bar" id="search" placeholder="Search..."></input>
      <button id="search_button" class="search_button">SEARCH</button>
      <span id="search_dialogue" class="dialogue"></span>
    </article>
    <table id="db">
      <thead>
        <tr id="dbHEADER">
        </tr>
      </thead>
      <tbody id="dbBODY">
      </tbody>
    </table>
    <script src="db.js"></script>
  </body>
</html>
